app_title: "Thumbs Up Friday Website Editor"
logo:
  src: "/assets/TUF.png"

backend:
  name: github
  repo: charlie-ivin/New-TUF-website
  branch: main

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "site"
    label: "Site Settings"
    files:
      - file: "content/site.json"
        label: "Global Settings"
        name: "site"
        fields:
          - { label: "Footer Text", name: "footer_text", widget: "string" }
          - { label: "Footer Credit Label", name: "footer_credit_label", widget: "string" }
          - { label: "Footer Credit URL", name: "footer_credit_url", widget: "string" }
          - label: "External Links (open in a new tab)"
            name: "external_links"
            widget: "list"
            fields:
              - { label: "Button Label", name: "label", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }

  - name: "home"
    label: "Home Page"
    files:
      - file: "content/home.json"
        label: "Home"
        name: "home"
        fields:
          - { label: "Hero Heading", name: "hero_heading", widget: "string" }
          - { label: "Hero Paragraph", name: "hero_paragraph", widget: "text" }
          - label: "How It Works — Steps"
            name: "steps"
            widget: "list"
            fields:
              - { label: "Number", name: "number", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Text", name: "text", widget: "text" }
          - { label: "Treats Heading", name: "treats_heading", widget: "string" }
          - { label: "Treats Text", name: "treats_text", widget: "text" }

  - name: "timetable"
    label: "Timetable Page"
    files:
      - file: "content/timetable.json"
        label: "Timetable"
        name: "timetable"
        fields:
          - { label: "Intro Text", name: "intro", widget: "text" }
          - { label: "Day", name: "day", widget: "string" }
          - { label: "Location", name: "location", widget: "string" }
          - { label: "What To Bring", name: "what_to_bring", widget: "string" }
          - { label: "Google Calendar Embed URL", name: "calendar_embed_url", widget: "string" }

  - name: "apply"
    label: "Apply to Join Page"
    files:
      - file: "content/apply.json"
        label: "Apply to Join"
        name: "apply"
        fields:
          - { label: "Hero Heading", name: "hero_heading", widget: "string" }
          - { label: "Intro Text", name: "intro", widget: "text" }
          - label: "Why Join — Cards"
            name: "why_cards"
            widget: "list"
            fields:
              - { label: "Icon (emoji)", name: "icon", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Text", name: "text", widget: "text" }
          - label: "Team Quotes"
            name: "quotes"
            widget: "list"
            field: { label: "Quote", name: "quote", widget: "text" }
          - { label: "Apply Box Note", name: "apply_note", widget: "text" }
          - { label: "Apply Email Address", name: "apply_email", widget: "string" }

  - name: "timeline"
    label: "Timeline Page"
    files:
      - file: "content/timeline.json"
        label: "Timeline"
        name: "timeline"
        fields:
          - label: "Events"
            name: "events"
            widget: "list"
            fields:
              - { label: "Date", name: "date", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Text", name: "text", widget: "text" }
